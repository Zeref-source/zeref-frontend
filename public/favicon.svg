<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5e5"/>
      <stop offset="50%" stop-color="#00b4cc"/>
      <stop offset="100%" stop-color="#0088aa"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0088cc" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#060b10"/>
  <rect width="64" height="64" rx="14" fill="url(#glowGrad)" opacity="0.3"/>

  <!-- Outer border glow -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#00d4d4" stroke-width="0.5" opacity="0.5"/>

  <!-- Z shape: top bar -->
  <polygon points="10,10 54,10 54,18 26,18" fill="url(#zGrad)" filter="url(#glow)" opacity="0.95"/>
  <!-- Z top-right corner triangle -->
  <polygon points="42,18 54,10 54,18" fill="#00e5e5" opacity="0.7"/>

  <!-- Z diagonal stroke -->
  <polygon points="26,18 54,18 38,46 10,46" fill="url(#zGrad)" filter="url(#glow)" opacity="0.9"/>

  <!-- Z shape: bottom bar -->
  <polygon points="10,46 38,46 10,54 54,54 54,46" fill="url(#zGrad)" filter="url(#glow)" opacity="0.95"/>
  <!-- Z bottom-left triangle -->
  <polygon points="10,46 22,46 10,54" fill="#00e5e5" opacity="0.7"/>

  <!-- Top-left corner accent (teal small square) -->
  <rect x="10" y="10" width="9" height="8" fill="#00ffee" opacity="0.5" rx="1"/>

  <!-- Highlight lines on the Z -->
  <line x1="10" y1="10" x2="54" y2="10" stroke="#00ffff" stroke-width="0.8" opacity="0.6"/>
  <line x1="10" y1="54" x2="54" y2="54" stroke="#00ffff" stroke-width="0.8" opacity="0.6"/>
</svg>